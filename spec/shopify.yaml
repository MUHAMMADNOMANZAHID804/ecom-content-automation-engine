platform: shopify

seo_title:
  max_length: 70
  min_length: 40

meta_description:
  max_length: 160
  min_length: 120

description:
  min_length: 500
  max_length: 1000

features:
  min_count: 3
  max_count: 5

banned_words:
  - guaranteed lowest price
  - as seen on tv

banned_claims:
  - clinically proven
  - doctor recommended

max_brand_length: 60
max_all_caps_word_ratio: 0.25