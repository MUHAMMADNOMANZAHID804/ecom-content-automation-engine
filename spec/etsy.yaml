platform: etsy

title:
  max_length: 140
  min_length: 80

tags:
  max_count: 13
  max_length_each: 20

description:
  min_length: 600
  max_length: 1200
  handmade_disclosure_required: true
  vintage_age_disclosure_required: true

banned_words:
  - counterfeit
  - replica

banned_claims:
  - mass produced
  - factory made

max_brand_length: 40
max_all_caps_word_ratio: 0.20